<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>awkbuilder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #050a05;
      color: #8aff80;
      font-family: 'VT323', 'IBM Plex Mono', ui-monospace, monospace;
      min-height: 100vh;
    }
    #scan {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
    }
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
  </style>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <div id="scan"></div>
  <div id="vignette"></div>
  <aw-app></aw-app>
</body>
</html>
